services:
    pia-qbittorrent:
        image: j4ym0/pia-qbittorrent
        container_name: pia-qbittorrent
        cap_add:
            - NET_ADMIN
        environment:
            - PIA_REGION=netherlands
            - PIA_USERNAME=
            - PIA_PASSWORD=
            - PORT_FORWARDING=true
            - VPN_CLIENT=wireguard
            - WEBUI_PORT=8888
            - DOWNLOAD_DIR=
        volumes:
#            - ./auth.conf:/auth.conf
            - ./config:/config
#            - ./downloads:/downloads
        ports:
            - "8888:8888"
        restart: unless-stopped
